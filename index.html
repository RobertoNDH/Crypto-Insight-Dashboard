<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Prism | Crypto Dashboard</title>
  </head>
  <body>
    <div id="app">
        <header class="premium-header">
            <div class="header-content">
                <div class="brand">
                <div class="logo-icon">P</div>
                <h1>PRISM<span>.</span></h1>
                </div>
                
                <nav class="main-nav">
                <button class="nav-btn active" data-view="market">Mercado</button>
                <button class="nav-btn" data-view="portfolio">Mi Cartera</button>
                </nav>

                <div id="global-stats" class="header-stats">
                </div>
            </div>
        </header>

        <main class="container">
            <section id="view-market" class="view-section">
                <div class="section-title">
                <h2>Mercado Global</h2>
                <div class="search-box">
                    <input type="text" id="search-coin" placeholder="Buscar moneda...">
                </div>
                </div>
                <div id="market-container" class="card-section"></div>
            </section>

            <section id="view-portfolio" class="view-section hidden">
                <div class="section-title">
                <h2>Mi Patrimonio</h2>
                </div>
                <div id="portfolio-container" class="card-section"></div>
            </section>
        </main>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
